<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic Font — stories that drift between languages</title>
    <script type="module" crossorigin src="/assets/index-D32QlGjt.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-OMFVtB8q.css">
  </head>
  <body>
    <div id="app">
      <header>
        <div class="masthead">
          <div>
            <p id="genre" class="genre"></p>
            <h1 id="title"></h1>
          </div>
          <button id="library-toggle" aria-expanded="false" aria-controls="library">
            stories <span class="chev">⌄</span>

        <p class="hint">Hover a word to see it in the other language. Click to pin it.</p>

          <button id="lang-toggle" class="lang-toggle" type="button" aria-pressed="false">EN</button>
        </div>
      </header>
      <main id="story" class="story">
        <p class="loading">Loading font…</p>
      </main>
      <nav id="pager" class="pager" hidden>
        <button id="page-prev" type="button" aria-label="previous page">&larr;</button>
        <span id="page-label"></span>
        <button id="page-next" type="button" aria-label="next page">&rarr;</button>
      </nav>
    </div>
  </body>
