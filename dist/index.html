<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic Font — stories that drift between languages</title>
    <script type="module" crossorigin src="/assets/index-DOBFzn1s.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BGDw_UZc.css">
  </head>
  <body>
    <div id="app">
      <header>
        <div class="masthead">
          <div>
            <p id="genre" class="genre"></p>
            <h1 id="title"></h1>
          </div>
          <button id="library-toggle" aria-expanded="false" aria-controls="library">
            stories <span class="chev">⌄</span>
          </button>
        </div>
        <nav id="library" class="library"></nav>
        <p class="hint">
          Hover a word to see it in the other language. Click to pin it.
          Drag the slider to blend the whole story.
        </p>
        <div class="controls">
          <span class="lang-label">English</span>
          <input id="global-t" type="range" min="0" max="1000" value="0" />
          <span class="lang-label">Français</span>
          <label class="ambient">
            <input id="ambient" type="checkbox" />
            ambient drift
          </label>
        </div>
      </header>
      <main id="story" class="story">
        <p class="loading">Loading font…</p>
      </main>
    </div>
  </body>
</html>
